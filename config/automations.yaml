- id: '1777987272956'
  alias: Roborock finished cleaning Telegram map
  description: When Roborock reports a new last-clean-end timestamp, wait until it
    is truly finished (docked, charging/charge-complete, and no longer cleaning) before
    snapshotting the calibrated map and sending it to Telegram. This avoids false
    notifications during mid-run mop washing/docking and ignores stale startup restores.
  triggers:
  - platform: state
    entity_id: sensor.roborock_qrevo_edge_series_last_clean_end
    id: last_clean_end_changed
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.to_state is not
      none and trigger.from_state.state not in [''unknown'', ''unavailable'', ''none'',
      ''''] and trigger.to_state.state not in [''unknown'', ''unavailable'', ''none'',
      ''''] and trigger.from_state.state != trigger.to_state.state and as_timestamp(trigger.to_state.state,
      0) > 0 and (as_timestamp(now()) - as_timestamp(trigger.to_state.state, 0)) <=
      900 }}'
  actions:
  - wait_template: '{{ is_state(''vacuum.roborock_qrevo_edge_series'', ''docked'')
      and is_state(''binary_sensor.roborock_qrevo_edge_series_cleaning'', ''off'')
      and states(''sensor.roborock_qrevo_edge_series_status'') in [''charging'', ''charging_complete'']
      }}'
    timeout:
      hours: 4
    continue_on_timeout: false
  - delay:
      minutes: 2
  - condition: state
    entity_id: vacuum.roborock_qrevo_edge_series
    state: docked
  - condition: state
    entity_id: binary_sensor.roborock_qrevo_edge_series_cleaning
    state: 'off'
  - condition: state
    entity_id: sensor.roborock_qrevo_edge_series_status
    state:
    - charging
    - charging_complete
  - action: image.snapshot
    data:
      filename: /tmp/roborock_last_cleaning_map.jpg
    target:
      entity_id: image.roborock_qrevo_edge_series_1705_custom
  - action: telegram_bot.send_photo
    data:
      caption: 'Roborock finished cleaning ✅

        Time: {{ now().strftime(''%H:%M, %d %b %Y'') }}

        Map snapshot attached.'
      entity_id: notify.cle_s_bot_chien_le
      file: /tmp/roborock_last_cleaning_map.jpg
      parse_mode: plain_text
  initial_state: true
  mode: single
  max_exceeded: silent
- id: '1778343944881'
  alias: Roborock dock clean water box alert
  description: When the Roborock dock clean water box problem sensor turns on, send
    a Telegram notification and create a Todoist task to fill/check the clean water
    tank.
  triggers:
  - platform: state
    entity_id: binary_sensor.roborock_qrevo_edge_series_dock_clean_water_box
    from: 'off'
    to: 'on'
  conditions: []
  actions:
  - action: notify.send_message
    target:
      entity_id: notify.cle_s_bot_chien_le
    data:
      title: Roborock needs water
      message: Roborock dock clean water box problem is active. Please fill/check
        the clean water tank.
  - target:
      entity_id: todo.inbox
    data:
      item: Fill/check Roborock clean water tank
      description: Created by Home Assistant because binary_sensor.roborock_qrevo_edge_series_dock_clean_water_box
        changed to on.
      due_date: '{{ now().date().isoformat() }}'
    action: todo.add_item
  mode: single
